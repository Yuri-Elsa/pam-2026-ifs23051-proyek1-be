version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: watchlist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       watchlist
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: watchlist_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_HOST:          0.0.0.0
      APP_PORT:          8080
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_NAME:           watchlist
      DB_USER:           postgres
      DB_PASSWORD:       postgres
      UPLOAD_DIR:        /app/uploads
      UPLOAD_MAX_SIZE_MB: 5
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: watchlist_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@watchlist.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - dev

volumes:
  postgres_data:
  uploads_data:
